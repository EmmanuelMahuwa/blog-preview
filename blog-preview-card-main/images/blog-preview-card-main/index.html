<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="" type="text/css" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <!-- <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  <style>
    body {
      background-color: orange;
      font-family: Arial, Helvetica, sans-serif;
    }
    .blog-date {
      font-weight: bold;
    }
    .blog-heading {
      color: orange;
      font-weight: bold;
      font-size: 38px;
    }
    .home-background {
      background-color: orange;
      
      margin: 0;
    }
    .blog-section {
      background-color: rgb(253, 252, 252);
      margin: 50px;
      width: 500px;
      height: 800px;
      padding: 10px;
      border-radius: 20px;
    }
    .purpose {
      background-color: orange;
      width: 56px;
      border-radius: 5px;
      padding-left: 10px;
      padding-bottom: 5px;
      padding-right: 10px;
      padding-top: 5px;
    }
  </style>
</head>
<body>
  
  <div class="home-background">
    <div class="blog-section">
      <p class="purpose">
        learning
      </p>
      <p class="blog-date">
        Published: 21 December 2023
      </p>
      <p class="blog-heading">
        HTML & CSS foundation
      </p>
      <p class="blog-info">
        These languages are the backbone of every<br> 
      website, defining structure, content and<br> 
      presentation.<br>
      </p>
      <img src=""> Greg Hooper 
    </div>
  </div>
</body>
</html>
