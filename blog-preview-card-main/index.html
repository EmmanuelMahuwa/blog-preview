<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  
  <div class="home-background">
    <div class="blog-section">
      <img class="blog-image" src="assets/images/illustration-article.svg" alt="blog image">
      <p class="purpose">
        learning
      </p>
      <p class="blog-date">
        Published: 21 December 2023
      </p>
      <p class="blog-heading">
        HTML & CSS foundation
      </p>
      <p class="blog-info">
        These languages are the backbone of every
      website, defining structure, content and 
      presentation.
      </p>
      <div class="blog-author">
         <img src="assets/images/image-avatar.webp" alt="Greg Hooper"> <p>Greg Hooper</p> 
      </div>
     
    </div>
  </div>
</body>
</html>
